/* ── BUSCADOR ── */
function Buscador({open,onClose,onGo}){
  const [q,setQ]=useState("");
  const ref=useRef(null);
  useEffect(()=>{if(open&&ref.current)ref.current.focus();},[open]);
  useEffect(()=>{const h=e=>{if(e.key==="Escape")onClose();};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[onClose]);
  const res=useMemo(()=>{
    if(q.trim().length<2)return[];
    const lq=q.toLowerCase();
    const out=[];
    T.forEach(t=>t.conceptos.forEach(c=>{
      if(c.t.toLowerCase().includes(lq)||c.d.toLowerCase().includes(lq)||c.cl.toLowerCase().includes(lq))
        out.push({t,c});
    }));
    return out.slice(0,10);
  },[q]);
  if(!open)return null;
  return(
    <div onClick={onClose} className="afi" style={{position:"fixed",inset:0,zIndex:60,background:"rgba(23,23,23,.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"clamp(36px,10vh,120px) 16px 40px"}}>
      <div onClick={e=>e.stopPropagation()} className="asc" style={{width:"100%",maxWidth:620,background:"var(--papel)",borderRadius:18,overflow:"hidden",boxShadow:"0 30px 80px -30px rgba(0,0,0,.6)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"16px 18px",borderBottom:"1px solid var(--line)"}}>
          <span style={{color:"var(--soft)"}}><I n="search" s={18}/></span>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Busca un tema: narrador, metáfora, copretérito…" style={{flex:1,border:"none",background:"transparent",fontSize:16,fontFamily:"inherit",color:"var(--tinta)",outline:"none"}}/>
          <button onClick={onClose} className="fm" style={{border:"1px solid var(--line)",background:"var(--card)",borderRadius:7,padding:"3px 8px",fontSize:11,cursor:"pointer",color:"var(--soft)"}}>ESC</button>
        </div>
        <div style={{maxHeight:"52vh",overflowY:"auto"}}>
          {q.trim().length<2&&<p style={{padding:"24px 20px",color:"var(--soft)",fontSize:14,margin:0}}>Escribe al menos dos letras para buscar en los tres trimestres.</p>}
          {q.trim().length>=2&&res.length===0&&<p style={{padding:"24px 20px",color:"var(--soft)",fontSize:14,margin:0}}>Sin resultados para «{q}».</p>}
          {res.map((r,i)=>(
            <button key={i} onClick={()=>{onGo(r.t.id);onClose();}} style={{display:"block",width:"100%",textAlign:"left",border:"none",borderBottom:"1px solid var(--line)",background:"transparent",padding:"13px 20px",cursor:"pointer"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(0,0,0,.04)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                <span className="fm" style={{fontSize:10,fontWeight:600,padding:"2px 6px",borderRadius:12,background:r.t.c,color:"#fff",filter:"brightness(.75)"}}>{r.t.s}</span>
                <span style={{fontWeight:600,fontSize:14}}>{r.c.t}</span>
                <span className="fm" style={{fontSize:10,color:"var(--soft)",marginLeft:"auto"}}>{r.c.p}</span>
              </div>
              <p style={{fontSize:12.5,color:"var(--soft)",margin:0,lineHeight:1.4,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:1,WebkitBoxOrient:"vertical"}}>{r.c.d}</p>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

          return(
            <div key={cl} style={{border:"1px solid var(--line)",borderRadius:14,overflow:"hidden",background:"var(--card)"}}>
              <button onClick={()=>setOpen(ab?null:cl)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"15px 18px",background:"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                <span style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{width:8,height:8,borderRadius:3,background:accent,display:"inline-block",flexShrink:0}}/>
                  <span className="fd" style={{fontSize:18,fontWeight:600}}>{cl}</span>
                  <span className="fm" style={{fontSize:10.5,color:"var(--soft)"}}>{items.length} temas</span>
                </span>
                <span style={{color:dark,transform:ab?"rotate(180deg)":"none",transition:"transform .22s"}}><I n="chev" s={18}/></span>
              </button>
              {ab&&(
                <div className="afu" style={{padding:"0 18px 8px"}}>
                  {items.map((c,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"baseline",gap:12,padding:"12px 0",borderTop:"1px solid var(--line)"}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,fontSize:14.5,marginBottom:2}}>{c.t}</div>
                        <div style={{fontSize:13,color:"var(--soft)",lineHeight:1.45}}>{c.d}</div>
                      </div>
                      <span className="fm" style={{fontSize:10.5,color:dark,whiteSpace:"nowrap",fontWeight:500,flexShrink:0}}>{c.p}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Flashcards({tri,accent,dark}){
  const cards=tri.flash;
  const [idx,setIdx]=useState(0);
  const [flip,setFlip]=useState(false);
  const [dom,setDom]=useState({});
  const card=cards[idx];
  const go=d=>{ setFlip(false); setTimeout(()=>setIdx(p=>(p+d+cards.length)%cards.length),130); };
  const marcar=()=>setDom(p=>({...p,[idx]:!p[idx]}));
  const nDom=Object.values(dom).filter(Boolean).length;
  return(
    <div className="afu">
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:18}}>
        <div>
          <h3 className="fd" style={{fontSize:24,fontWeight:600,margin:"0 0 4px"}}>Flashcards</h3>
          <p style={{color:"var(--soft)",fontSize:14.5,margin:0}}>Toca la tarjeta para ver la respuesta.</p>
        </div>
        <div className="fm" style={{fontSize:12,color:"var(--soft)"}}>Dominadas: <span style={{color:dark,fontWeight:600}}>{nDom}</span> / {cards.length}</div>
      </div>
      <div style={{height:5,background:"var(--line)",borderRadius:10,overflow:"hidden",marginBottom:22}}>
        <div style={{height:"100%",width:`${(nDom/cards.length)*100}%`,background:accent,transition:"width .4s",borderRadius:10}}/>
      </div>

      <div className={"flip-wrap"+(flip?" flipped":"")} style={{maxWidth:540,margin:"0 auto"}}>
        <div className="flip-inner" style={{minHeight:260}}>
          <div className="flip-face" onClick={()=>setFlip(true)} style={{border:"1px solid var(--line)",borderRadius:18,background:"var(--card)",padding:"30px 26px",minHeight:260,display:"flex",flexDirection:"column",cursor:"pointer",boxShadow:"0 8px 28px -18px rgba(0,0,0,.28)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <span className="fm" style={{fontSize:10.5,letterSpacing:".1em",color:dark,textTransform:"uppercase",fontWeight:600}}>Pregunta {idx+1} de {cards.length}</span>
              {dom[idx]&&<span style={{color:accent}}><I n="check" s={18}/></span>}
            </div>
            <p className="fd" style={{fontSize:22,fontWeight:500,lineHeight:1.25,flex:1,display:"flex",alignItems:"center",margin:0}}>{card.q}</p>
            <div className="fm" style={{fontSize:10.5,color:"var(--soft)",display:"flex",alignItems:"center",gap:5,marginTop:16}}><I n="rot" s={12}/> Toca para voltear</div>
          </div>
          <div className="flip-face flip-back" onClick={()=>setFlip(false)} style={{border:`1px solid ${accent}`,borderRadius:18,background:"var(--tinta)",color:"var(--papel)",padding:"30px 26px",minHeight:260,display:"flex",flexDirection:"column",cursor:"pointer"}}>
            <span className="fm" style={{fontSize:10.5,letterSpacing:".1em",color:accent,textTransform:"uppercase",fontWeight:600,marginBottom:14}}>Respuesta</span>
            <p style={{fontSize:17,lineHeight:1.5,flex:1,display:"flex",alignItems:"center",margin:0}}>{card.a}</p>
            <div className="fm" style={{fontSize:10.5,opacity:.6,marginTop:14,display:"flex",alignItems:"center",gap:5}}><I n="book" s={12}/>{card.p}</div>
          </div>
        </div>
      </div>

      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:22,flexWrap:"wrap"}}>
        <button onClick={()=>go(-1)} style={btnS()}><I n="arrl" s={15}/> Anterior</button>
        <button onClick={marcar} style={{...btnS(),background:dom[idx]?accent:"var(--card)",color:dom[idx]?"#fff":"var(--tinta)",borderColor:dom[idx]?accent:"var(--line)",filter:dom[idx]?"brightness(.9)":"none"}}>
          <I n="check" s={15}/> {dom[idx]?"Dominada":"Marcar dominada"}
        </button>
        <button onClick={()=>go(1)} style={btnS()}>Siguiente <I n="arr" s={15}/></button>
      </div>
    </div>
  );
}
const btnS=()=>({display:"inline-flex",alignItems:"center",gap:7,padding:"10px 17px",borderRadius:30,border:"1px solid var(--line)",background:"var(--card)",cursor:"pointer",fontFamily:"inherit",fontSize:13.5,color:"var(--tinta)"});

function Simulador({tri,accent,dark}){
  const qs=tri.sim;
  const [i,setI]=useState(0);
  const [resp,setResp]=useState({});
  const [fin,setFin]=useState(false);
  const q=qs[i];
  const ans=resp[i];
  const responder=o=>{
    if(ans!==undefined)return;
    setResp(p=>({...p,[i]:{sel:o,ok:o===q.ok}}));
  };
  const next=()=>{ if(i+1<qs.length)setI(i+1); else setFin(true); };
  const reiniciar=()=>{ setI(0);setResp({});setFin(false); };
  const aciertos=Object.values(resp).filter(r=>r.ok).length;
  if(fin){
    const pct=Math.round((aciertos/qs.length)*100);
    return(
      <div className="asc" style={{maxWidth:480,margin:"10px auto",textAlign:"center"}}>
        <div style={{color:dark,display:"flex",justifyContent:"center",marginBottom:8}}><I n="spark" s={32}/></div>
        <h3 className="fd" style={{fontSize:28,fontWeight:700,margin:"0 0 6px"}}>Terminaste el simulador</h3>
        <p style={{color:"var(--soft)",marginBottom:22}}>{pct>=80?"Dominas muy bien este trimestre.":pct>=50?"Buen avance; repasa lo que falló.":"Vale la pena volver a los conceptos y las flashcards."}</p>
        <div style={{background:"var(--tinta)",color:"var(--papel)",borderRadius:18,padding:"28px",marginBottom:22}}>
          <div className="fd" style={{fontSize:60,fontWeight:900,lineHeight:1,color:accent}}>{pct}%</div>
          <div className="fm" style={{fontSize:12,opacity:.75,marginTop:4}}>{aciertos} de {qs.length} correctas</div>
        </div>
        <button onClick={reiniciar} style={btnS()}><I n="rot" s={15}/> Intentar de nuevo</button>
      </div>
    );
  }
  return(
    <div className="afu" style={{maxWidth:640,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
        <span className="fm" style={{fontSize:11,color:dark,fontWeight:600,letterSpacing:".05em",textTransform:"uppercase"}}>{q.b}</span>
        <span className="fm" style={{fontSize:11,color:"var(--soft)"}}>{i+1} / {qs.length}</span>
      </div>
      <div style={{height:5,background:"var(--line)",borderRadius:10,overflow:"hidden",marginBottom:20}}>
        <div style={{height:"100%",width:`${((i+(ans!==undefined?1:0))/qs.length)*100}%`,background:accent,transition:"width .35s"}}/>
      </div>
      <h3 className="fd" style={{fontSize:22,fontWeight:600,lineHeight:1.3,margin:"0 0 18px"}}>{q.q}</h3>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {q.ops.map((o,oi)=>{
          let bg="var(--card)",bd="var(--line)";
          if(ans!==undefined){
            if(oi===q.ok){bg="rgba(111,143,114,.15)";bd="var(--verde)";}
            else if(oi===ans.sel){bg="rgba(184,92,56,.12)";bd="var(--terracota)";}
          }
          return(
            <button key={oi} onClick={()=>responder(oi)} disabled={ans!==undefined} style={{display:"flex",alignItems:"center",gap:12,textAlign:"left",padding:"13px 15px",borderRadius:12,cursor:ans!==undefined?"default":"pointer",border:`1.5px solid ${bd}`,background:bg,fontFamily:"inherit",fontSize:14.5}}>
              <span className="fm" style={{width:26,height:26,borderRadius:7,flexShrink:0,display:"grid",placeItems:"center",fontSize:11.5,fontWeight:600,border:`1px solid ${bd}`,background:ans!==undefined&&(oi===q.ok)?"var(--verde)":(ans!==undefined&&oi===ans.sel?"var(--terracota)":"transparent"),color:ans!==undefined&&(oi===q.ok||oi===ans?.sel)?"#fff":"var(--soft)"}}>
                {ans!==undefined?(oi===q.ok?<I n="check" s={13}/>:(oi===ans.sel?<I n="x" s={13}/>:String.fromCharCode(65+oi))):String.fromCharCode(65+oi)}
              </span>
              <span style={{flex:1}}>{o}</span>
            </button>
          );
        })}
      </div>
      {ans!==undefined&&(
        <div className="afu" style={{marginTop:14,padding:"14px 16px",borderRadius:12,background:ans.ok?"rgba(111,143,114,.1)":"rgba(184,92,56,.08)",border:`1px solid ${ans.ok?"var(--verde)":"var(--terracota)"}`}}>
          <div className="fm" style={{fontSize:10.5,fontWeight:600,letterSpacing:".07em",textTransform:"uppercase",color:ans.ok?"var(--verde)":"var(--terracota)",marginBottom:5}}>{ans.ok?"Correcto":"Para repasar"}</div>
          <p style={{margin:0,fontSize:13.5,lineHeight:1.5,color:"var(--soft)"}}>{q.why}</p>
        </div>
      )}
      {ans!==undefined&&(
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:18}}>
          <button onClick={next} style={{...btnS(),background:"var(--tinta)",color:"var(--papel)",borderColor:"var(--tinta)"}}>
            {i+1<qs.length?"Siguiente":"Ver resultado"} <I n="arr" s={15}/>
          </button>
        </div>
      )}
    </div>
  );
}

/* ── APP ── */
function App(){
  const [vista,setVista]=useState("portada");
  const [busca,setBusca]=useState(false);
  useEffect(()=>{
    const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setBusca(true);}};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[]);
  const tri=T.find(t=>t.id===vista);
  const cerrarBusca=useCallback(()=>setBusca(false),[]);
  return(
    <div style={{position:"relative",zIndex:2,minHeight:"100vh"}}>
      <button onClick={()=>setBusca(true)} aria-label="Buscar tema" style={{position:"fixed",right:"clamp(14px,3vw,28px)",bottom:"clamp(14px,3vw,28px)",zIndex:40,display:"inline-flex",alignItems:"center",gap:8,padding:"11px 16px",borderRadius:30,background:"var(--tinta)",color:"var(--papel)",border:"none",cursor:"pointer",boxShadow:"0 10px 28px -10px rgba(0,0,0,.55)",fontFamily:"inherit",fontSize:13}}>
        <I n="search" s={16}/> Buscar
        <span className="fm" style={{fontSize:9.5,opacity:.55,border:"1px solid rgba(244,239,230,.3)",borderRadius:4,padding:"1px 5px"}}>⌘K</span>
      </button>
      {vista==="portada"
        ? <Portada onEnter={setVista}/>
        : <Trimestre tri={tri} goHome={()=>setVista("portada")}/>
      }
      <Buscador open={busca} onClose={cerrarBusca} onGo={id=>{setVista(id);}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
